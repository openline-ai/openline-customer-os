syntax = "proto3";
package proto;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/openline-ai/openline-customer-os/packages/server/message-store/proto/generated/";

enum SenderType {
  CONTACT = 0;
  USER = 1;
}
enum MessageType {
  MESSAGE = 0;
  FILE = 1;
}
enum MessageDirection {
  INBOUND = 0;
  OUTBOUND = 1;
}
enum MessageChannel {
  WEB_CHAT = 0;
  MAIL = 1;
  VOICE = 2;
}

message MessageId {
  string id = 1;
}

message Message {
  string id = 1;
  string conversationId = 2;
  MessageType type = 3;
  string message = 4;
  MessageChannel channel = 5;
  MessageDirection direction = 6;
  google.protobuf.Timestamp time = 7;

  SenderType senderType = 8;
  string senderId = 9;
}